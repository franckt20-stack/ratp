<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Prochains passages</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: 'Share Tech Mono', monospace;
    color: #f5f5dc;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: #003a65;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #00a86b;
  }

  .header-title {
    font-size: 15px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
  }

  .ratp-logo {
    width: 28px;
    height: 28px;
    background: #00a86b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
    flex-shrink: 0;
  }

  .stop-section {
    margin: 12px 8px;
    background: #0d1b2a;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #1b2838;
  }

  .stop-header {
    background: #003a65;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stop-icon {
    width: 26px;
    height: 26px;
    background: #00a86b;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    flex-shrink: 0;
  }

  .stop-name {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .departure-row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #1b2838;
    gap: 10px;
    min-height: 48px;
  }

  .departure-row:last-child {
    border-bottom: none;
  }

  .line-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 28px;
    min-width: 42px;
    padding: 0 6px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    background: #6c5ce7;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .direction-text {
    font-size: 13px;
    color: #c8d6e5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .time-display {
    font-size: 20px;
    font-weight: bold;
    color: #feca57;
    text-align: right;
    white-space: nowrap;
    min-width: 60px;
    text-shadow: 0 0 8px rgba(254, 202, 87, 0.4);
  }

  .time-display.imminent {
    color: #ff6b6b;
    animation: blink 1s ease-in-out infinite;
    text-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
  }

  .time-display.approaching {
    color: #ffa502;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .no-data {
    padding: 20px 14px;
    text-align: center;
    color: #636e72;
    font-size: 13px;
  }

  .refresh-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 16px;
    background: #003a65;
    border-top: 3px solid #00a86b;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }

  .refresh-btn {
    background: #00a86b;
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }

  .refresh-btn:active { background: #00875a; }
  .refresh-btn:disabled { background: #2d3436; color: #636e72; }

  .refresh-btn.loading {
    position: relative;
    color: transparent;
  }

  .refresh-btn.loading::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border: 3px solid #636e72;
    border-top-color: #fff;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    margin: -10px 0 0 -10px;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .last-update {
    font-size: 11px;
    color: #636e72;
    text-align: center;
    padding: 8px 0 0 0;
  }

  .content-area { padding-bottom: 80px; }

  .error-msg {
    padding: 12px 14px;
    color: #ff6b6b;
    font-size: 12px;
    line-height: 1.6;
  }
  .err-code {
    display: inline-block;
    background: #3d0000;
    border: 1px solid #7a0000;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    margin-right: 6px;
    color: #ff9999;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Prochains passages</span>
  <div class="ratp-logo">B</div>
</div>

<div class="content-area" id="app">
  <div class="no-data" style="padding:40px 14px">Chargement…</div>
</div>

<div class="refresh-bar" style="flex-direction:column;gap:6px;padding:10px 16px">
  <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">Actualiser</button>
  <div style="font-size:11px;color:#636e72;font-family:'Share Tech Mono',monospace;letter-spacing:1px">
    Auto-refresh dans <span id="countdown" style="color:#00a86b">30s</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIGURATION — modifiez uniquement cette section
// ══════════════════════════════════════════════════════

const PRIM_TOKEN  = 'LR93KggTkThxa7Mmw0xbUytukiGqP9WG';
const REFRESH_SEC = 30;

const ARRETS = [
  { id: '30029', nom: '21 - Stade Charlety',  sens: null, lignes: null },
  { id: '28007', nom: '67 - Stade Charlety',  sens: null, lignes: null },
  { id: '30094', nom: '21 - Daviel',          sens: null, lignes: null },
  { id: '28847', nom: 'T3a - Stade Charlety', sens: null, lignes: null },
  { id: '24112', nom: 'T3a - Stade Charlety', sens: null, lignes: null }
];

// ══════════════════════════════════════════════════════
//  NE PAS MODIFIER EN DESSOUS
// ══════════════════════════════════════════════════════

const PRIM_URL = 'https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring';

const LINE_COLORS = {
  '20':'#C95F2A','21':'#C9910D','22':'#8D5E26','24':'#7B7B00','26':'#8D5E26',
  '27':'#8D5E26','28':'#6A378E','29':'#1C4E9F','31':'#1C4E9F','38':'#6E5B9C',
  '39':'#CD2027','42':'#0079C2','43':'#CD2027','47':'#0055A4','54':'#1C4E9F',
  '57':'#7BBF4E','60':'#7BBF4E','62':'#C9910D','63':'#C9910D','64':'#8D5E26',
  '67':'#7BBF4E','68':'#8D5E26','69':'#C9910D','72':'#C9910D','76':'#C95F2A',
  '83':'#7BBF4E','84':'#7BBF4E','88':'#7BBF4E','91':'#C9910D','92':'#0055A4',
  '185':'#0055A4','216':'#7BBF4E','289':'#1C4E9F',
  'T1':'#D2007A','T2':'#D2007A','T3a':'#00814D','T3b':'#00814D',
  'T4':'#F28C00','T5':'#662483','T6':'#BD8B00','T7':'#8A5A14','T8':'#D2007A',
  'N':'#1a2040',
};

function lineColor(code) {
  return LINE_COLORS[code] || '#6c5ce7';
}

// ── Extraction robuste du numéro de ligne ─────────────────
// PRIM peut renvoyer PublishedLineName sous 3 formes selon le transporteur :
//   • [{value: "21"}]   → bus RATP/OPTILE
//   • "21"              → forme scalaire rare
//   • absent/null       → RER, certains Transilien
// Dans ce dernier cas on extrait depuis LineRef et on mappe vers le nom court.
function extractLineName(mvj) {
  // Forme 1 : tableau d'objets [{value: "21"}]
  const fromArray = mvj?.PublishedLineName?.[0]?.value;
  if (fromArray && fromArray.trim()) return fromArray.trim();

  // Forme 2 : chaîne directe "21"
  const raw = mvj?.PublishedLineName;
  if (typeof raw === 'string' && raw.trim()) return raw.trim();

  // Forme 3 : JourneyNote contient parfois le libellé court (ex: Transilien)
  const fromNote = mvj?.JourneyNote?.[0]?.value;
  if (fromNote && fromNote.trim()) return fromNote.trim();

  // Forme 4 : LineRef = "STIF:Line::C01073:" → extraire "C01073"
  // puis mapper via TABLE_LIGNES si disponible, sinon afficher l'id technique
  const lineRef = mvj?.LineRef?.value ?? '';
  const match   = lineRef.match(/::([^:]+):/);
  const techId  = match ? match[1] : null;
  if (techId) return TABLE_LIGNES[techId] ?? techId;

  return '?';
}

// Table de correspondance ID technique → numéro de ligne affiché
// Couvre les lignes RATP les plus courantes. Complétez si besoin.
const TABLE_LIGNES = {
  // Bus RATP (extrait du référentiel IDFM)
  'C01073':'21',  'C01077':'26',  'C01080':'29',  'C01088':'38',
  'C01091':'42',  'C01096':'47',  'C01104':'57',  'C01108':'60',
  'C01111':'62',  'C01112':'63',  'C01113':'64',  'C01114':'65',
  'C01116':'67',  'C01117':'68',  'C01118':'69',  'C01120':'72',
  'C01125':'76',  'C01133':'83',  'C01134':'84',  'C01138':'88',
  'C01141':'91',  'C01142':'92',  'C01143':'93',  'C01144':'94',
  'C01145':'95',  'C01146':'96',
  // Trams
  'C01389':'T3a', 'C01390':'T3b', 'C01374':'T1',  'C01371':'T2',
  'C01391':'T4',  'C01398':'T5',  'C01399':'T6',  'C01400':'T7',
  // RER (nom court)
  'C01727':'A',   'C01728':'B',   'C01729':'C',   'C01730':'D',
  'C01731':'E',
  // Métro
  'C01372':'1',   'C01373':'2',   'C01374':'3',   'C01386':'3b',
  'C01375':'4',   'C01376':'5',   'C01377':'6',   'C01378':'7',
  'C01388':'7b',  'C01379':'8',   'C01380':'9',   'C01381':'10',
  'C01382':'11',  'C01383':'12',  'C01384':'13',  'C01385':'14',
};

// ── Temps ────────────────────────────────────────────
function minsUntil(d) {
  if (!d || isNaN(d)) return 999;
  return Math.max(0, Math.round((d - Date.now()) / 60000));
}
function formatTime(m) {
  if (m === 0) return "À l'approche";
  if (m === 1) return '1 min';
  return m + ' min';
}
function timeClass(m) {
  if (m <= 1) return 'imminent';
  if (m <= 3) return 'approaching';
  return '';
}

// ── Appel API PRIM ────────────────────────────────────
async function fetchDeps(arret) {
  const monRef = `STIF:StopPoint:Q:${arret.id}:`;
  const url    = `${PRIM_URL}?MonitoringRef=${encodeURIComponent(monRef)}`;

  let r;
  try {
    r = await fetch(url, { headers: { 'apikey': PRIM_TOKEN, 'Accept': 'application/json' } });
  } catch (e) {
    throw new Error('Erreur réseau : ' + (e.message || String(e)));
  }

  if (!r.ok) {
    const txt = await r.text().catch(() => '');
    throw new Error(`HTTP ${r.status} — ${txt.slice(0, 120)}`);
  }

  const json = await r.json();

  const visits =
    json?.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]
        ?.MonitoredStopVisit ?? [];

  let departures = visits.map(v => {
    const mvj  = v?.MonitoredVehicleJourney ?? {};
    const call = mvj?.MonitoredCall ?? {};

    const line      = extractLineName(mvj);  // ← CORRIGÉ
    const dest      = mvj?.DestinationName?.[0]?.value ?? '—';
    const rawTime   = call?.ExpectedDepartureTime ?? call?.AimedDepartureTime;
    const dep       = rawTime ? new Date(rawTime) : null;
    const atStop    = call?.VehicleAtStop === true || call?.VehicleAtStop === 'true';
    const cancelled = mvj?.Monitored === false   || mvj?.Monitored === 'false';

    return { line, dest, dep, atStop, cancelled };
  }).filter(d => !d.cancelled && d.dep !== null);

  if (arret.lignes?.length) {
    departures = departures.filter(d => arret.lignes.includes(d.line));
  }

  return departures;
}

// ── Groupement ───────────────────────────────────────
function groupDepartures(deps) {
  const groups = {};
  for (const d of deps) {
    const key = d.line + '|' + d.dest;
    if (!groups[key]) groups[key] = { line: d.line, dest: d.dest, times: [] };
    if (groups[key].times.length < 2)
      groups[key].times.push(d.atStop ? 0 : minsUntil(d.dep));
  }
  return Object.values(groups).sort((a, b) => (a.times[0] ?? 999) - (b.times[0] ?? 999));
}

// ── Rendu ────────────────────────────────────────────
function renderStop(arret, deps, err) {
  const head = `
    <div class="stop-header">
      <div class="stop-icon">B</div>
      <div>
        <span class="stop-name">${arret.nom}</span>
        ${arret.sens ? `<div style="font-size:11px;color:#8db4cc;margin-top:2px">${arret.sens}</div>` : ''}
        <div style="font-size:10px;color:#3a5a7a;margin-top:1px">ID ${arret.id}</div>
      </div>
    </div>`;

  if (err) return `
    <div class="stop-section">${head}
      <div class="error-msg"><span class="err-code">ERREUR</span> ${err.message}</div>
    </div>`;

  if (!deps.length) return `
    <div class="stop-section">${head}
      <div class="no-data">Aucun passage prévu dans l'heure</div>
    </div>`;

  const rows = groupDepartures(deps).map(g =>
    g.times.map(m => `
      <div class="departure-row">
        <div class="line-badge" style="background:${lineColor(g.line)}">${g.line}</div>
        <div class="direction-text">${g.dest}</div>
        <div class="time-display ${timeClass(m)}">${formatTime(m)}</div>
      </div>`).join('')
  ).join('');

  return `<div class="stop-section">${head}${rows}</div>`;
}

// ── Auto-refresh ──────────────────────────────────────
let countdown = REFRESH_SEC, autoTimer;

function startAutoRefresh() {
  clearInterval(autoTimer);
  countdown = REFRESH_SEC;
  updateCountdown();
  autoTimer = setInterval(() => {
    countdown--;
    updateCountdown();
    if (countdown <= 0) { countdown = REFRESH_SEC; refreshAll(); }
  }, 1000);
}

function updateCountdown() {
  const el = document.getElementById('countdown');
  if (el) el.textContent = countdown + 's';
}

// ── Refresh ───────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.classList.add('loading');

  const results = await Promise.allSettled(
    ARRETS.map(async a => {
      try   { return { arret: a, deps: await fetchDeps(a), err: null }; }
      catch (e) { return { arret: a, deps: null, err: e }; }
    })
  );

  let html = '';
  for (const r of results) {
    if (r.status !== 'fulfilled') continue;
    const { arret, deps, err } = r.value;
    html += renderStop(arret, deps ?? [], err);
  }

  const ts = new Date().toLocaleTimeString('fr-FR');
  html += `<div class="last-update">Mis à jour : ${ts} — API IDFM PRIM</div>`;

  document.getElementById('app').innerHTML = html;
  btn.disabled = false;
  btn.classList.remove('loading');
  startAutoRefresh();
}

refreshAll();
</script>

</body>
</html>
